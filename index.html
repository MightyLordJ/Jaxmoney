<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JaxMoney</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JaxMoney">
<style>
  :root{
    --page-bg: #0A0E0C;
    --card-bg: #1C1C1E;
    --text-primary: #F2F2F7;
    --text-secondary: #98989D;
    --separator: #38383A;
    --blue: #0A84FF;
    --purple: #5E5CE6;
    --purple-bg: rgba(94,92,230,0.32);
    --blue-bg: rgba(10,132,255,0.16);
    --green: #30D158;
    --green-bg: rgba(48,209,88,0.15);
    --red: #FF453A;
    --red-bg: rgba(255,69,58,0.15);
    --orange: #FF9F0A;
    --gray-fill: #2C2C2E;
    --gray-fill-alt: #242426;
    --gray-fill-2: #3A3A3C;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "PingFang TC", "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html{ touch-action: manipulation; }
  button, select, .key, .conv-row, .quick-btn, .range-tab{ touch-action: manipulation; }
  
  /* 鎖定全螢幕視窗，避免 PWA 模式抖動 */
  html, body{
    height: 100%;
    height: -webkit-fill-available;
    margin: 0;
    background: var(--page-bg);
    font-family: var(--font);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    overflow: hidden;
  }

  .board-header{
    position:fixed;
    top:0; left:0; right:0;
    z-index:20;
    padding: calc(10px + env(safe-area-inset-top)) 20px 8px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    background: var(--page-bg);
    max-width:430px;
    margin:0 auto;
  }

  .canvas-wrap{
    position:fixed;
    top: var(--header-height, 50px);
    left:0; right:0; bottom:0;
    display:flex;
    justify-content:center;
    overflow:hidden;
    touch-action:none;
  }

  /* 主容器：以 13 mini 螢幕為基準，彈性拉伸貼齊上下 */
  .app-canvas{
    width:100%;
    max-width:430px;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background: var(--page-bg);
    transform: none !important;
  }

  .board{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:visible;
  }

  .view-container{
    flex:1;
    width:100%;
    position:relative;
    overflow:hidden;
  }

  .view-track{
    display:flex;
    width:200%;
    height:100%;
  }

  .view-panel{
    width:50%;
    flex:0 0 50%;
    min-width:0;
    height:100%;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
  }

  .board-title{
    font-size:17px;
    font-weight:700;
    letter-spacing:-0.2px;
    color:#5E5CE6;
  }
  .board-version{
    font-size:11px;
    font-weight:500;
    color:var(--text-secondary);
  }
  .board-title-group{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .refresh-btn{
    width:13px;
    height:13px;
    padding:0;
    background:transparent;
    border:none;
    color: #5E5CE6;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn svg{ width:100%; height:100%; }
  .refresh-btn.spinning svg{ animation: pull-spin 0.7s linear infinite; }
  @keyframes pull-spin{ to{ transform: rotate(360deg); } }
  .header-offline-badge{
